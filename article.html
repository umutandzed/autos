<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Autos.News | Haber</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --surface: #111111;
  --surface2: #161616;
  --line: #202020;
  --line2: #2a2a2a;
  --text: #e8e8e8;
  --muted: #666;
  --muted2: #444;
  --accent: #d85a30;
  --max: 1180px;
  --article-max: 720px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: "DM Sans", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

a { color: inherit; text-decoration: none; }

.shell {
  width: min(calc(100% - 48px), var(--max));
  margin: 0 auto;
}

.nav {
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(10, 10, 10, 0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--line);
}

.nav-inner {
  display: flex;
  align-items: center;
  height: 56px;
  gap: 0;
}

.nav-brand {
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text);
  flex-shrink: 0;
  margin-right: 36px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.nav-brand-bar { width: 3px; height: 20px; background: #fff; border-radius: 2px; }
.nav-brand span { color: var(--accent); }
.nav-sep { width: 1px; height: 20px; background: var(--line2); margin-right: 32px; flex-shrink: 0; }

.nav-back {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--muted);
  padding: 6px 0;
}

.nav-right {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-left: auto;
}

.nav-live {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 6px 13px;
  border-radius: 7px;
  background: var(--surface2);
  border: 1px solid var(--line2);
  font-size: 12px;
  color: var(--muted);
}

.live-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent);
  animation: blink 2.2s ease-in-out infinite;
}

@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }

.article-hero {
  position: relative;
  overflow: hidden;
  min-height: 380px;
  background: linear-gradient(145deg, #0d1520, #162540, #1e3050);
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
}

.article-hero-bg {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 180px;
  opacity: 0.04;
  pointer-events: none;
  user-select: none;
}

.article-hero-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(10, 10, 10, 1) 0%, rgba(10, 10, 10, 0.6) 40%, transparent 100%);
}

.article-hero-body {
  position: relative;
  z-index: 2;
  width: min(calc(100% - 48px), var(--max));
  margin: 0 auto;
  padding-bottom: 36px;
}

.article-cat {
  display: inline-flex;
  align-items: center;
  background: var(--accent);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 4px 11px;
  border-radius: 5px;
  margin-bottom: 16px;
  font-family: "DM Mono", monospace;
}

.article-title {
  font-size: clamp(22px, 3.5vw, 36px);
  font-weight: 600;
  line-height: 1.15;
  letter-spacing: -0.04em;
  max-width: var(--article-max);
  margin-bottom: 16px;
}

.article-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 12px;
  color: var(--muted);
  font-family: "DM Mono", monospace;
  flex-wrap: wrap;
}

.meta-dot { color: var(--muted2); }

.article-source {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 3px 10px 3px 6px;
  border-radius: 99px;
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid rgba(255, 255, 255, 0.08);
}

.source-avatar {
  width: 18px;
  height: 18px;
  border-radius: 4px;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  font-weight: 700;
  color: #fff;
}

.article-wrap { padding: 48px 0 72px; }

.article-layout {
  display: grid;
  grid-template-columns: var(--article-max) 1fr;
  gap: 56px;
  align-items: start;
}

.article-content { max-width: var(--article-max); }

.article-lead {
  font-size: 17px;
  line-height: 1.75;
  color: #bbb;
  margin-bottom: 32px;
  font-weight: 400;
  border-left: 3px solid var(--accent);
  padding-left: 20px;
}

.article-body p {
  font-size: 15.5px;
  line-height: 1.85;
  color: #aaa;
  margin-bottom: 22px;
}

.article-divider {
  height: 1px;
  background: var(--line);
  margin: 36px 0;
}

.article-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding-top: 20px;
  border-top: 1px solid var(--line);
  margin-top: 40px;
  flex-wrap: wrap;
}

.article-tags { display: flex; gap: 8px; flex-wrap: wrap; }

.tag {
  font-size: 11px;
  padding: 5px 12px;
  border-radius: 99px;
  background: var(--surface2);
  border: 1px solid var(--line2);
  color: var(--muted);
  font-family: "DM Mono", monospace;
}

.article-source-link {
  font-size: 12px;
  color: var(--muted);
  font-family: "DM Mono", monospace;
  display: flex;
  align-items: center;
  gap: 6px;
}

.article-sidebar { padding-top: 4px; }

.sidebar-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  font-family: "DM Mono", monospace;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.sidebar-label::after {
  content: "";
  flex: 1;
  height: 1px;
  background: var(--line);
}

.related-list { display: flex; flex-direction: column; gap: 0; }

.related-item {
  display: flex;
  gap: 12px;
  padding: 14px 0;
  border-bottom: 1px solid var(--line);
  cursor: pointer;
}

.related-item:last-child { border-bottom: none; }

.related-thumb {
  width: 60px;
  height: 48px;
  border-radius: 7px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  opacity: 0.8;
}

.related-body { flex: 1; min-width: 0; }

.related-cat {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--accent);
  font-family: "DM Mono", monospace;
  margin-bottom: 4px;
}

.related-title {
  font-size: 13px;
  font-weight: 500;
  line-height: 1.35;
  letter-spacing: -0.02em;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.related-date {
  font-size: 11px;
  color: var(--muted);
  font-family: "DM Mono", monospace;
  margin-top: 5px;
}

.sidebar-source-box {
  margin-top: 28px;
  padding: 16px;
  background: var(--surface2);
  border: 1px solid var(--line2);
  border-radius: 10px;
}

.source-box-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  font-family: "DM Mono", monospace;
  margin-bottom: 10px;
}

.source-box-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.source-box-desc { font-size: 12px; color: var(--muted); line-height: 1.6; }

.source-box-link {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  margin-top: 12px;
  font-size: 12px;
  color: var(--accent);
  font-family: "DM Mono", monospace;
}

.empty-state {
  width: min(calc(100% - 48px), var(--max));
  margin: 36px auto 0;
  background: var(--surface2);
  border: 1px solid var(--line2);
  border-radius: 14px;
  padding: 24px;
}

.footer {
  border-top: 1px solid var(--line);
  padding: 22px 0;
}

.footer-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.footer-brand {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.footer-brand span { color: var(--accent); }

.footer-text {
  font-size: 11px;
  color: var(--muted);
  font-family: "DM Mono", monospace;
}

.g1 { background: linear-gradient(145deg, #0d1b2a, #1b2d45); }
.g2 { background: linear-gradient(145deg, #1a0d00, #3d2000); }
.g3 { background: linear-gradient(145deg, #1a1a00, #3a3500); }
.g4 { background: linear-gradient(145deg, #001020, #001e38); }
.g5 { background: linear-gradient(145deg, #0d001a, #22003d); }
.g6 { background: linear-gradient(145deg, #001a10, #003d22); }
.g7 { background: linear-gradient(145deg, #1a0505, #3d1010); }
.g8 { background: linear-gradient(145deg, #0a0a1a, #15153d); }

@media (max-width: 900px) {
  .article-layout {
    grid-template-columns: 1fr;
    gap: 40px;
  }
  .article-hero { min-height: 280px; }
}

@media (max-width: 600px) {
  .nav-live { display: none; }
  .article-hero { min-height: 240px; }
  .article-title { font-size: 22px; }
}
</style>
</head>
<body>

<nav class="nav">
  <div class="shell">
    <div class="nav-inner">
      <a class="nav-brand" href="index.html">
        <div class="nav-brand-bar"></div>
        Autos<span>.News</span>
      </a>
      <div class="nav-sep"></div>
      <a class="nav-back" href="index.html">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
        Tum haberler
      </a>
      <div class="nav-right">
        <div class="nav-live">
          <div class="live-dot"></div>
          Canli Akis
        </div>
      </div>
    </div>
  </div>
</nav>

<main id="article-root"></main>

<footer class="footer">
  <div class="shell">
    <div class="footer-inner">
      <div class="footer-brand">Autos<span>.News</span></div>
      <div class="footer-text">Resmi kaynak odakli · Gunluk guncelleme · Turkce</div>
    </div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="articles.js"></script>
<script>
  const root = document.getElementById("article-root");
  const slug = new URLSearchParams(window.location.search).get("slug");

  function renderMissing(message) {
    root.innerHTML = `
      <section class="empty-state">
        <div class="source-box-label">Haber bulunamadi</div>
        <div class="source-box-name">Bu icerik su anda listede yok.</div>
        <div class="source-box-desc">${escapeHtml(message)}</div>
      </section>
    `;
  }

  function renderArticle(article, related) {
    document.title = article.title + " - Autos.News";

    root.innerHTML = `
      <div class="article-hero ${gradientClass(0)}">
        <div class="article-hero-bg">${articleIcon(article)}</div>
        <div class="article-hero-overlay"></div>
        <div class="article-hero-body">
          <div class="article-cat">${article.category}</div>
          <h1 class="article-title">${escapeHtml(article.title)}</h1>
          <div class="article-meta">
            <div class="article-source">
              <div class="source-avatar">${escapeHtml(article.brandInitials)}</div>
              ${escapeHtml(article.brand)}
            </div>
            <span class="meta-dot">·</span>
            <span>${escapeHtml(article.dateLabel)}</span>
            <span class="meta-dot">·</span>
            <span>${escapeHtml(article.readTime)}</span>
          </div>
        </div>
      </div>

      <div class="shell article-wrap">
        <div class="article-layout">
          <article class="article-content">
            <p class="article-lead">${escapeHtml(article.excerpt || article.bodyPreview)}</p>

            <div class="article-body">
              ${renderBodyParagraphs(article.body)}
              <div class="article-divider"></div>
            </div>

            <div class="article-footer">
              <div class="article-tags">
                <span class="tag">#${escapeHtml(article.brandTag)}</span>
                <span class="tag">#${escapeHtml(article.categoryTag)}</span>
                <span class="tag">#${escapeHtml(article.readTime)}</span>
              </div>
              <a class="article-source-link" href="${escapeAttribute(article.originalUrl)}" target="_blank" rel="noopener noreferrer">
                Kaynak: ${escapeHtml(article.brand)} ->
              </a>
            </div>
          </article>

          <aside class="article-sidebar">
            <div class="sidebar-label">Diger haberler</div>
            <div class="related-list">
              ${renderRelated(related)}
            </div>

            <div class="sidebar-source-box">
              <div class="source-box-label">Kaynak</div>
              <div class="source-box-name">${escapeHtml(article.brand)}</div>
              <div class="source-box-desc">Resmi kaynaklardan derlenen, AI ile Turkceye sadeleştirilmiş icerik. Orijinal link asagidaki butonda kalir.</div>
              <a class="source-box-link" href="${escapeAttribute(article.originalUrl)}" target="_blank" rel="noopener noreferrer">
                Resmi kaynagi ac ->
              </a>
            </div>
          </aside>
        </div>
      </div>
    `;
  }

  async function boot() {
    if (!slug) {
      renderMissing("URL icinde slug bulunmuyor.");
      return;
    }

    try {
      const article = await fetchArticleBySlug(slug);
      if (!article) {
        renderMissing("Supabase tablosunda bu slug'a ait bir kayit bulunamadi.");
        return;
      }

      const related = await fetchRelatedArticles(article, 5);
      renderArticle(article, related);
    } catch (error) {
      renderMissing(error.message);
    }
  }

  boot();
</script>
</body>
</html>
